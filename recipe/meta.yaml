# Ensure that the VW and ASP meta.yaml files are in sync with each other and with
# ISIS. Dep versions are synced to ISIS 10.x environment.yml.
{% set version = "3.7.0" %}

package:
    name: stereo-pipeline
    version: {{ version }}

source:
  git_url: https://github.com/NeoGeographyToolkit/StereoPipeline.git
  # 3d1953916 = a7568977e + two gated linux-aarch64 fixes: OpenMP (manual gomp
  # setup like Mac) and SSE (disable x86-only -msse4.1 on aarch64 in
  # src/asp/CMakeLists.txt). Both gated to APPLE/aarch64, so behavior-identical
  # for linux-64/osx; all platforms build from this commit. 2026-06-05.
  git_rev: 3d1953916

build:
    number: 6
    string: asp_6

requirements:
    build:
    host:
        # It is convenient to keep the tools in the host section so they
        # always exist in the environment.
        # Synced with ISIS 10.x environment.yml (2026-03-30).
        # Linux compiler bumped to gcc >=14 (2026-04-04): conda-forge
        # builds libgdal against libstdcxx 15.x (CXXABI_1.3.15), which
        # gcc 13 cannot link. Mac stays at 1.9 (clang, unaffected).
        # TODO(oalexan1): Revisit if ISIS bumps cxx-compiler above 1.9.
        - cmake >=3.27,<3.28
        - make
        - c-compiler 1.9  # [not linux]
        - cxx-compiler 1.9  # [not linux]
        - fortran-compiler 1.9  # [not linux]
        - gcc_linux-64 >=14,<15  # [linux and not aarch64]
        - gxx_linux-64 >=14,<15  # [linux and not aarch64]
        - gfortran_linux-64 >=14,<15  # [linux and not aarch64]
        - gcc_linux-aarch64 >=14,<15  # [aarch64]
        - gxx_linux-aarch64 >=14,<15  # [aarch64]
        - gfortran_linux-aarch64 >=14,<15  # [aarch64]
        - git
        - wget
        - libunwind # [linux]
        - xorg-libxxf86vm # [linux]
        - mesa-libgl-devel-cos7-x86_64  # [linux and not aarch64]
        - libglvnd-cos7-x86_64          # [linux and not aarch64]
        # aarch64: cos7 x86_64 CDTs do not exist; use the libglvnd dev stack
        # (same one used to build ISIS on aarch64).
        - libgl-devel      # [aarch64]
        - libegl-devel     # [aarch64]
        - libopengl-devel  # [aarch64]
        - ld64_osx-64 # [osx and x86_64]
        # ceres needs a variant with suitesparse support (for TheiaSfM).
        - ceres-solver 2.2.0 h036b7f2_2  # [osx and arm64]
        - ceres-solver 2.2.0 haa0d064_2  # [osx and x86_64]
        - ceres-solver 2.2.0 h30ec75d_2  # [linux and not aarch64]
        - ceres-solver 2.2.0 hae81a69_2  # [aarch64]
        - chrpath # [linux]
        - cgal
        - eigen >=3,<4
        - fftw
        - gflags
        - glog
        - llvm-openmp
        - mesalib
        - nlohmann_json =3.11.2
        - parallel
        - pbzip2
        - pdal >=2.10.0,<3
        - rapidjson
        - rocksdb <10  # [linux]
        - rocksdb 10.10.1  # [osx]
        - suitesparse <7.7.0
        - vlfeat
        # Deps synced to ISIS 10.x
        - armadillo
        - blas
        - libopenblas
        - libblas * *openblas*    # [osx]
        - liblapack * *openblas*  # [osx]
        - bullet >=3.25
        - bz2file
        - bzip2
        - cspice =67
        - csm >=3.0.3,<3.0.4
        - curl >=8.14.1,<9
        - doxygen
        - embree >=3,<4
        - ffmpeg
        - gdal 3.12.2
        - geos >=3.14,<3.15
        - geotiff
        - gmp
        - conda-forge::gsl >=2.6,<2.7
        - hdf5
        - highfive
        - icu
        - inja
        - jama
        - kalasiris
        - krb5
        - libboost >=1.88.0,<1.89
        - libgdal 3.12.2
        - proj 9.7.*
        - fmt >=12.0    # no_spdlog forks don't need tight fmt pin
        - libopencv >=4.12,<4.13
        - libpng >=1.6.34,<1.7
        - libprotobuf >=6,<7
        - libtiff >=4.5,<4.8
        - libxml2
        - mkl # [linux and not aarch64]
        - mysql # [linux]
        - mysql-connector-c # [linux]
        - nanoflann >=1.4.2,<1.5
        - nn
        - opencv >=4.12,<4.13
        - openssl >=3.5,<4
        - pcl >=1.15,<1.16
        - plio >=1.6.3
        - protobuf >=6,<7
        - python 3.13
        - python_abi 3.13
        - qhull
        - qt6-main >=6,<7
        - qwt =6.3.0
        - spiceypy >=6,<7
        - spiceql =1.3.0=asp*
        - sqlite >=3.46.0,<4
        - superlu
        - swig
        - tbb
        - tbb-devel
        - tnt
        - x264
        - xalan-c >=1.12,<1.13  # [linux and not aarch64]
        - xerces-c >=3.3.0,<3.4
        - xorg-kbproto
        - xorg-libice
        - xorg-libsm
        - xorg-libx11
        - xorg-libxi
        - zlib
        # Our custom-built packages from nasa-ames-stereo-pipeline channel.
        # Pin build string =asp* so conda never swaps for conda-forge versions
        # (conda-forge's spiceql has a buggy global ctor that crashes).
        - ale =1.2.0=asp*
        - usgscsm =2.0.2=asp*
        - spiceql =1.3.0=asp*
        - isis =10.0.0=asp*
        - visionworkbench =3.7.0=asp*
        # MultiView breakup: on aarch64 + osx-64 the cgal_tools + MultiView
        # components are prebuilt conda packages (build.sh skips their inline
        # build, detecting prebuilt libtheia in $PREFIX). theia,
        # voxblox, texrecon (texrecon bundles the mve libs + rayint headers).
        - cgal_tools  # [aarch64 or (osx and x86_64)]
        - theia       # [aarch64 or (osx and x86_64)]
        - voxblox     # [aarch64 or (osx and x86_64)]
        - texrecon    # [aarch64 or (osx and x86_64)]

    run:
        # Synced with ISIS 10.x environment.yml (2026-03-30).
        - cmake >=3.27,<3.28
        - make
        - c-compiler 1.9  # [not linux]
        - cxx-compiler 1.9  # [not linux]
        - fortran-compiler 1.9  # [not linux]
        - gcc_linux-64 >=14,<15  # [linux and not aarch64]
        - gxx_linux-64 >=14,<15  # [linux and not aarch64]
        - gfortran_linux-64 >=14,<15  # [linux and not aarch64]
        - gcc_linux-aarch64 >=14,<15  # [aarch64]
        - gxx_linux-aarch64 >=14,<15  # [aarch64]
        - gfortran_linux-aarch64 >=14,<15  # [aarch64]
        - git
        - wget
        - libunwind # [linux]
        - xorg-libxxf86vm # [linux]
        - mesa-libgl-devel-cos7-x86_64  # [linux and not aarch64]
        - libglvnd-cos7-x86_64          # [linux and not aarch64]
        - libgl-devel      # [aarch64]
        - libegl-devel     # [aarch64]
        - libopengl-devel  # [aarch64]
        - ld64_osx-64 # [osx and x86_64]
        - ceres-solver 2.2.0 h036b7f2_2  # [osx and arm64]
        - ceres-solver 2.2.0 haa0d064_2  # [osx and x86_64]
        - ceres-solver 2.2.0 h30ec75d_2  # [linux and not aarch64]
        - ceres-solver 2.2.0 hae81a69_2  # [aarch64]
        - chrpath # [linux]
        - cgal
        - eigen >=3,<4
        - fftw
        - gflags
        - glog
        - llvm-openmp
        - mesalib
        - nlohmann_json =3.11.2
        - parallel
        - pbzip2
        - pdal >=2.10.0,<3
        - rapidjson
        - rocksdb <10  # [linux]
        - rocksdb 10.10.1  # [osx]
        - suitesparse <7.7.0
        - vlfeat
        - armadillo
        - blas
        - libopenblas
        - libblas * *openblas*    # [osx]
        - liblapack * *openblas*  # [osx]
        - bullet >=3.25
        - bz2file
        - bzip2
        - cspice =67
        - csm >=3.0.3,<3.0.4
        - curl >=8.14.1,<9
        - embree >=3,<4
        - ffmpeg
        - gdal 3.12.2
        - geos >=3.14,<3.15
        - geotiff
        - gmp
        - conda-forge::gsl >=2.6,<2.7
        - hdf5
        - highfive
        - icu
        - inja
        - jama
        - kalasiris
        - krb5
        - libboost >=1.88.0,<1.89
        - libgdal 3.12.2
        - proj 9.7.*
        - fmt >=12.0    # no_spdlog forks don't need tight fmt pin
        - libopencv >=4.12,<4.13
        - libpng >=1.6.34,<1.7
        - libprotobuf >=6,<7
        - libtiff >=4.5,<4.8
        - libxml2
        - mkl # [linux and not aarch64]
        - mysql # [linux]
        - mysql-connector-c # [linux]
        - nanoflann >=1.4.2,<1.5
        - nn
        - opencv >=4.12,<4.13
        - openssl >=3.5,<4
        - pcl >=1.15,<1.16
        - plio >=1.6.3
        - protobuf >=6,<7
        - python 3.13
        - python_abi 3.13
        - qhull
        - qt6-main >=6,<7
        - qwt =6.3.0
        - spiceypy >=6,<7
        - spiceql =1.3.0=asp*
        - sqlite >=3.46.0,<4
        - superlu
        - swig
        - tbb
        - tnt
        - x264
        - xalan-c >=1.12,<1.13  # [linux and not aarch64]
        - xerces-c >=3.3.0,<3.4
        - xorg-kbproto
        - xorg-libice
        - xorg-libsm
        - xorg-libx11
        - xorg-libxi
        - zlib
        # Our custom-built packages from nasa-ames-stereo-pipeline channel.
        # Pin build string =asp* so conda never swaps for conda-forge versions.
        - ale =1.2.0=asp*
        - usgscsm =2.0.2=asp*
        - isis =10.0.0=asp*
        - visionworkbench =3.7.0=asp*
        # MultiView breakup (aarch64 + osx-64): prebuilt components, see host section.
        - cgal_tools  # [aarch64 or (osx and x86_64)]
        - theia       # [aarch64 or (osx and x86_64)]
        - voxblox     # [aarch64 or (osx and x86_64)]
        - texrecon    # [aarch64 or (osx and x86_64)]

test:
    commands:
        - export ISISROOT=$PREFIX && stereo_pprc --version

about:
    home: https://github.com/NeoGeographyToolkit/StereoPipeline
    license: APACHE II
    summary: A suite of automated stereogrammetry tools

extra:
  recipe-maintainers:
    - oleg.alexandrov@gmail.com
